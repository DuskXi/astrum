site_name: Astrum
site_description: Lightweight in-process async DAG orchestration for Python.
site_author: DuskXi
site_url: https://duskxi.github.io/astrum/
docs_dir: docs
site_dir: site

extra_javascript:
  - assets/javascripts/language-redirect.js

theme:
  name: material
  language: zh
  features:
    - content.code.copy
    - content.code.select
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 使用指南: guide.md
  - 外部 API Reference:
      - api/external/index.md
      - 配置: api/external/config.md
      - 装饰器与注册表: api/external/decorators-registry.md
      - 调度执行: api/external/scheduler-execution.md
      - 数据传输声明: api/external/data-transport.md
      - 模型与异常: api/external/models-errors.md
  - 内部 API Reference:
      - api/internal/index.md
      - 调度器内部: api/internal/scheduler.md
      - 执行计划内部: api/internal/planner.md
      - 数据传输内部: api/internal/data-transport.md
      - 类型工具: api/internal/type-tools.md
  - Examples:
      - Fast Start: examples/fast-start.md
      - Coffee Shop: examples/coffee-shop.md
      - Stateless Text Retriever: examples/stateless-text-retriever.md

plugins:
  - search
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_bases: true
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true
            show_source: true
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          site_description: Lightweight in-process async DAG orchestration for Python.
          nav_translations:
            首页: Home
            快速开始: Quickstart
            使用指南: Guide
            外部 API Reference: External API Reference
            内部 API Reference: Internal API Reference
            配置: Configuration
            装饰器与注册表: Decorators and Registry
            调度执行: Scheduler Execution
            数据传输声明: Data Transport Declarations
            模型与异常: Models and Errors
            调度器内部: Scheduler Internals
            执行计划内部: Planning Internals
            数据传输内部: Data Transport Internals
            类型工具: Type Tools

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
